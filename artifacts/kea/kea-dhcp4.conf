{
  "Dhcp4": {
    "interfaces-config": {
      "interfaces": ["enp8s0f1"]
    },
    "lease-database": {
      "type": "memfile",
      "name": "/var/lib/kea/kea-leases4.csv",
      "lfc-interval": 3600
    },
    "authoritative": true,
    "renew-timer": 900,
    "rebind-timer": 1800,
    "valid-lifetime": 3600,
    "client-classes": [
      {
        "name": "ipxe_client",
