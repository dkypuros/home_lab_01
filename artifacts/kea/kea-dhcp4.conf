        "next-server": "10.0.0.1"
      },
      {
        "name": "pxe_client",
        "test": "not (substring(option[77].hex, 0, 4) == 0x69505845)",
        "boot-file-name": "undionly.kpxe",
        "next-server": "10.0.0.1"
      }
    ],
    "subnet4": [
      {
        "id": 1,
        "subnet": "10.0.0.0/24",
        "interface": "enp8s0f1",
        "pools": [{"pool": "10.0.0.100 - 10.0.0.199"}],
        "reservations": [
          {
            "hw-address": "74:56:3c:08:60:bd",
            "ip-address": "10.0.0.102",
            "hostname": "system-2"
          },
          {
            "hw-address": "00:13:3b:90:ec:93",
            "ip-address": "10.0.0.103",
            "hostname": "system-3"
          }
        ],
        "option-data": [
          {"name": "routers", "data": "10.0.0.1"},
          {"name": "domain-name-servers", "data": "10.0.0.1"},
          {"name": "domain-name", "data": "lab.local"}
        ]
      }
    ]
  }
}
